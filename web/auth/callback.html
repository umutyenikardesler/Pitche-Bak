<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Yönlendiriliyor — SahayaBak</title>
  <style>
    body { font-family: system-ui, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #f3f4f6; color: #374151; }
    .box { text-align: center; padding: 2rem; }
    .spinner { width: 40px; height: 40px; border: 3px solid #e5e7eb; border-top-color: #16a34a; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="box">
    <div class="spinner"></div>
    <p>Uygulamaya yönlendiriliyorsunuz...</p>
  </div>
  <script>
    (function() {
      function tryRedirect() {
        var hash = window.location.hash.slice(1);
        if (hash && hash.indexOf('access_token=') !== -1 && hash.indexOf('refresh_token=') !== -1) {
          var encoded = encodeURIComponent(hash);
          window.location.href = 'myapp://auth/callback?d=' + encoded;
          return;
        }
        document.querySelector('.box').innerHTML =
          '<p style="color:#dc2626; margin-bottom:1rem;">Bağlantı bilgisi alınamadı.</p>' +
          '<p style="font-size:0.9rem; color:#6b7280; margin-bottom:1rem;">E-posta uygulamasının tarayıcısı linki düzgün işleyemeyebilir. Lütfen:</p>' +
          '<ul style="text-align:left; max-width:280px; margin:0 auto 1rem; color:#4b5563; font-size:0.9rem;">' +
          '<li>Linke tekrar tıklayın, veya</li>' +
          '<li>Linki kopyalayıp Chrome / Safari\'de açın</li>' +
          '</ul>' +
          '<p style="font-size:0.85rem; color:#9ca3af;">Çoğu durumda linke ikinci kez tıklamak sorunu çözer.</p>';
      }
      // Kısa gecikme: Bazı tarayıcılarda hash redirect sonrası hemen gelmeyebilir
      if (window.location.hash) {
        tryRedirect();
      } else {
        setTimeout(tryRedirect, 150);
      }
    })();
  </script>
</body>
</html>
