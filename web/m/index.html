<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Uygulama açılıyor — SahayaBak</title>
    <style>
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        background: #f3f4f6;
        color: #374151;
      }
      .box {
        text-align: center;
        padding: 24px;
        max-width: 460px;
      }
      .title {
        color: #16a34a;
        font-weight: 900;
        font-size: 1.05rem;
        margin: 0 0 12px 0;
      }
      .spinner {
        width: 38px;
        height: 38px;
        border: 3px solid #e5e7eb;
        border-top-color: #16a34a;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 12px auto 14px;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .btn {
        display: inline-block;
        margin-top: 10px;
        background: #16a34a;
        color: #fff;
        border: none;
        border-radius: 12px;
        padding: 12px 16px;
        font-weight: 900;
        cursor: pointer;
      }
      .hint {
        margin-top: 10px;
        font-size: 0.9rem;
        color: #6b7280;
        line-height: 1.35;
      }
      .error {
        color: #dc2626;
        font-weight: 800;
        display: none;
        margin-top: 12px;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <p class="title" id="msg">Uygulama açılıyor…</p>
      <div class="spinner" aria-hidden="true"></div>
      <p style="margin: 0; color: #6b7280">Maç detayına yönlendiriliyorsunuz.</p>
      <button id="openApp" class="btn" style="display: none">Uygulamayı Aç</button>
      <p id="hint" class="hint" style="display: none">
        Otomatik açılmazsa bu butona dokunun. iOS’ta tarayıcı bazen otomatik yönlendirmeyi engelleyebilir.
      </p>
      <p id="error" class="error">Maç bilgisi alınamadı.</p>
    </div>
    <script>
      (function () {
        function getMatchId() {
          // /m/<id> path desteği (rewrite ile /m/index.html servis edilir)
          var path = (window.location.pathname || "").replace(/\/+$/, "");
          var m = path.match(/\/m\/([^\/]+)$/);
          if (m && m[1]) return decodeURIComponent(m[1]);

          // ?id=<id> fallback
          var qs = new URLSearchParams(window.location.search || "");
          var id = qs.get("id") || qs.get("matchId");
          return id ? id : "";
        }

        function scheme() {
          // Dev build override: /m/<id>?s=myapp-dev
          var qs = new URLSearchParams(window.location.search || "");
          return qs.get("s") || "myapp";
        }

        var id = getMatchId();
        var openBtn = document.getElementById("openApp");
        var hint = document.getElementById("hint");
        var err = document.getElementById("error");

        if (!id) {
          err.style.display = "block";
          return;
        }

        // Önemli: triple-slash kullanıyoruz ki "match" host değil path olsun.
        // Böylece Expo Router route'u: /match/[id] doğru çözülür.
        var deepLink = scheme() + ":///match/" + encodeURIComponent(id);

        function openAppNow() {
          try {
            window.location.href = deepLink;
          } catch (_) {}
        }

        openAppNow();
        openBtn.style.display = "inline-block";
        hint.style.display = "block";
        openBtn.addEventListener("click", openAppNow);
      })();
    </script>
  </body>
</html>
